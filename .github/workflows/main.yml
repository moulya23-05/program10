name = DevOps Pipeline
     on:
       push:
        branches:["main"]
    jobs:
       build:
         runs-on:'windows-latest'
         steps:
          -name:Copypath code
          uses:actions/copypath @ v4
          -name:Setup Python
          uses:actions/setup-python @ v5
          with:
            python-version:'3.12'
            -name:Run Python File
            run: python app.py
